# Generated by scripts/generate_configs.py. Edit the generator, not this file.
# Replace the provider subscription placeholder URLs before use.

proxy-providers:
  provider1:
    type: http
    url: 'https://example.invalid/replace-with-provider-1-subscription'
    path: ./proxy_provider/provider1.yaml
    interval: 86400
    proxy: 直连
    filter: '(?i)^(?!.*(?:官网|套餐|流量|剩余|到期|过期|客服|网址|通知|更新|客户端|倍率说明)).*$'
    health-check:
      enable: true
      lazy: true
      url: https://www.gstatic.com/generate_204
      interval: 300
      expected-status: 204
    override:
      additional-prefix: '[P1] '
  provider2:
    type: http
    url: 'https://example.invalid/replace-with-provider-2-subscription'
    path: ./proxy_provider/provider2.yaml
    interval: 86400
    proxy: 直连
    filter: '(?i)^(?!.*(?:官网|套餐|流量|剩余|到期|过期|客服|网址|通知|更新|客户端|倍率说明)).*$'
    health-check:
      enable: true
      lazy: true
      url: https://www.gstatic.com/generate_204
      interval: 300
      expected-status: 204
    override:
      additional-prefix: '[P2] '

proxies:
  - { name: 直连, type: direct, udp: true }
  - { name: 拒绝, type: reject }

mixed-port: 7890
redir-port: 7892
tproxy-port: 7895
allow-lan: true
mode: rule
log-level: info
ipv6: false
unified-delay: true
tcp-concurrent: true
external-controller: 0.0.0.0:9090
external-controller-cors:
  allow-origins:
    - '*'
  allow-private-network: true
secret: 'CHANGE_ME_TO_A_UNIQUE_LONG_RANDOM_SECRET'

profile:
  store-selected: true
  store-fake-ip: true

sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  override-destination: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - Mijia Cloud
    - '+.push.apple.com'
    - '+.lan'
    - '+.local'

tun:
  enable: true
  stack: mixed
  device: utun
  dns-hijack:
    - any:53
    - tcp://any:53
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true
  strict-route: true
  endpoint-independent-nat: false

dns:
  enable: true
  listen: 0.0.0.0:7874
  ipv6: false
  cache-algorithm: arc
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: rule
  fake-ip-filter:
    - RULE-SET,private-domain,real-ip
    - RULE-SET,china-domain,real-ip
    - RULE-SET,connectivity-check,real-ip
    - RULE-SET,category-ntp,real-ip
    - RULE-SET,apple-push,real-ip
    - RULE-SET,compatibility,real-ip
    - MATCH,fake-ip
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  direct-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  direct-nameserver-follow-policy: true
  respect-rules: true
  nameserver-policy:
    'rule-set:private-domain':
      - https://dns.alidns.com/dns-query
      - https://doh.pub/dns-query
    'rule-set:china-domain':
      - https://dns.alidns.com/dns-query
      - https://doh.pub/dns-query
    'rule-set:connectivity-check':
      - https://dns.alidns.com/dns-query
      - https://doh.pub/dns-query
    'rule-set:category-ntp':
      - https://dns.alidns.com/dns-query
      - https://doh.pub/dns-query
    'rule-set:apple-push':
      - https://dns.alidns.com/dns-query
      - https://doh.pub/dns-query
    'rule-set:compatibility':
      - https://dns.alidns.com/dns-query
      - https://doh.pub/dns-query

